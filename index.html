<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The "I'm Quitting" Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        input[type="text"], select {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            flex-grow: 1;
        }
        input[type="color"] { border: none; background: none; cursor: pointer; height: 35px; width: 35px; }
        button {
            padding: 0.5rem 1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        .btn-log {
            background-color: #27ae60;
            width: 100%;
            font-size: 1.2rem;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        .btn-log:hover { background-color: #219653; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        #timeline { max-height: 300px; overflow-y: auto; padding-right: 1rem; }
        .timeline-item {
            padding: 0.75rem;
            border-left: 4px solid;
            background: #f9f9f9;
            margin-bottom: 0.5rem;
            border-radius: 0 6px 6px 0;
        }
        .time-text { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
        hr { border: 0; border-top: 1px solid #eee; margin: 1.5rem 0; }
    </style>
</head>
<body>

    <h1>🚭 The "I'm Quitting" Tracker</h1>

    <div class="card">
        <h3>Log an Announcement</h3>
        <div class="form-group">
            <select id="friendSelect"></select>
        </div>
        <button class="btn-log" onclick="logEvent()">"I'm quitting tomorrow bro"</button>
    </div>

    <div class="card">
        <h3>Manage Friends</h3>
        
        <div style="margin-bottom: 0.5rem;"><strong>Add New:</strong></div>
        <div class="form-group">
            <input type="text" id="newFriendName" placeholder="Friend's Name">
            <input type="color" id="newFriendColor" value="#e74c3c">
            <button onclick="addFriend()">Add</button>
        </div>

        <hr>

        <div style="margin-bottom: 0.5rem;"><strong>Remove Existing:</strong></div>
        <div class="form-group" style="margin-bottom: 0;">
            <select id="removeFriendSelect"></select>
            <button class="btn-danger" onclick="removeFriend()">Remove</button>
        </div>
    </div>

    <div class="card">
        <h3>Timeline of Claims</h3>
        <canvas id="quitChart" height="200"></canvas>
    </div>

    <div class="card">
        <h3>Log History</h3>
        <div id="timeline"></div>
    </div>

    <script>
        // Initialize Data from LocalStorage or set defaults
        let appData = JSON.parse(localStorage.getItem('quitTrackerData')) || {
            friends: {
                "John Doe": { color: "#e74c3c", logs: [] }
            }
        };

        let myChart = null;

        // Save data to LocalStorage
        function saveData() {
            localStorage.setItem('quitTrackerData', JSON.stringify(appData));
        }

        // Add a new friend profile
        function addFriend() {
            const name = document.getElementById('newFriendName').value.trim();
            const color = document.getElementById('newFriendColor').value;
            
            if (name && !appData.friends[name]) {
                appData.friends[name] = { color: color, logs: [] };
                saveData();
                document.getElementById('newFriendName').value = '';
                refreshUI();
            } else if (appData.friends[name]) {
                alert("Friend already exists!");
            }
        }

        // Remove an existing friend profile
        function removeFriend() {
            const select = document.getElementById('removeFriendSelect');
            const nameToRemove = select.value;
            
            if (nameToRemove) {
                const confirmed = confirm(`Are you sure you want to completely remove ${nameToRemove} and all their log history?`);
                if (confirmed) {
                    delete appData.friends[nameToRemove];
                    saveData();
                    refreshUI();
                }
            }
        }

        // Log a new quit attempt
        function logEvent() {
            const selectedFriend = document.getElementById('friendSelect').value;
            if (selectedFriend) {
                const now = new Date();
                appData.friends[selectedFriend].logs.push(now.toISOString());
                saveData();
                refreshUI();
            }
        }

        // Update all Dropdowns
        function updateDropdowns() {
            const logSelect = document.getElementById('friendSelect');
            const removeSelect = document.getElementById('removeFriendSelect');
            
            logSelect.innerHTML = '';
            removeSelect.innerHTML = '';
            
            for (const friendName in appData.friends) {
                const option1 = document.createElement('option');
                option1.value = friendName;
                option1.textContent = friendName;
                logSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = friendName;
                option2.textContent = friendName;
                removeSelect.appendChild(option2);
            }
        }

        // Update the visual text timeline
        function updateTimeline() {
            const timelineDiv = document.getElementById('timeline');
            timelineDiv.innerHTML = '';

            let allLogs = [];
            for (const friendName in appData.friends) {
                const friendData = appData.friends[friendName];
                friendData.logs.forEach(dateString => {
                    allLogs.push({ name: friendName, date: new Date(dateString), color: friendData.color });
                });
            }
            allLogs.sort((a, b) => b.date - a.date); 

            allLogs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.style.borderLeftColor = log.color;
                
                const title = document.createElement('div');
                title.innerHTML = `<strong>${log.name}</strong> said they are quitting.`;
                
                const time = document.createElement('div');
                time.className = 'time-text';
                // Changed from toLocaleString() to toLocaleDateString() to remove time
                time.textContent = log.date.toLocaleDateString();

                item.appendChild(title);
                item.appendChild(time);
                timelineDiv.appendChild(item);
            });

            if (allLogs.length === 0) {
                timelineDiv.innerHTML = "<p style='color: #888;'>No events logged yet.</p>";
            }
        }

        // Update the Timeline Chart (X = Date, Y = Cumulative Count)
        function updateChart() {
            const ctx = document.getElementById('quitChart').getContext('2d');
            const datasets = [];

            for (const friendName in appData.friends) {
                const friendData = appData.friends[friendName];
                
                const sortedLogs = [...friendData.logs].sort((a, b) => new Date(a) - new Date(b));
                
                const dataPoints = sortedLogs.map((dateStr, index) => {
                    return {
                        x: new Date(dateStr),
                        y: index + 1
                    };
                });

                if (dataPoints.length > 0) {
                    const firstDate = new Date(dataPoints[0].x);
                    firstDate.setHours(firstDate.getHours() - 1); 
                    dataPoints.unshift({ x: firstDate, y: 0 });
                }

                datasets.push({
                    label: friendName,
                    data: dataPoints,
                    borderColor: friendData.color,
                    backgroundColor: friendData.color,
                    stepped: true, 
                    borderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6
                });
            }

            if (myChart) {
                myChart.destroy();
            }

            if (Object.keys(appData.friends).length === 0) {
                return;
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day', // Forces the axis to only show days
                                tooltipFormat: 'PP' // Formats tooltip to show Date only (e.g., Apr 25, 2026)
                            },
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 },
                            title: {
                                display: true,
                                text: 'Cumulative Times Quit'
                            }
                        }
                    },
                    plugins: {
                        legend: { display: true }
                    }
                }
            });
        }

        // Refresh all UI elements
        function refreshUI() {
            updateDropdowns();
            updateChart();
            updateTimeline();
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }

        // Initial load
        refreshUI();
    </script>
</body>
</html>
